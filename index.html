<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek & Nikita | 2026 Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --pink: #ff85a2; --pink-dark: #f06292; --glass: rgba(255, 255, 255, 0.9); }
        
        /* BACKGROUNDS USING LOCAL IMG FOLDER */
        body { 
            font-family: 'Quicksand', sans-serif; margin: 0; min-height: 100vh;
            background: url('img/bg_main.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img/bg_login.jpg');
            background-size: cover; display: flex; align-items: center; justify-content: center; z-index: 10000;
        }

        .login-card { background: var(--glass); padding: 40px; border-radius: 30px; text-align: center; width: 300px; backdrop-filter: blur(5px); }
        #main-content { display: none; flex-direction: column; align-items: center; padding: 20px; }
        .date-card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 25px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-left: 8px solid transparent; transition: 0.3s; }
        .completed { border-left-color: var(--pink-dark); background: #fffaff; }
        
        .media-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .media-item { width: 100%; border-radius: 15px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .upload-btn { display: inline-block; background: var(--pink); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        .prog-bar { font-size: 0.7rem; color: var(--pink-dark); margin-top: 5px; font-weight: bold; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        .sync-badge { background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 0.85rem; margin-bottom: 20px; }
        .pdf-btn { background: #555; color: white; padding: 15px 40px; border-radius: 35px; border: none; font-weight: bold; width: 100%; cursor: not-allowed; }
        .unlocked { background: var(--pink-dark) !important; cursor: pointer !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-card">
            <h2 style="font-family: 'Dancing Script'; color: var(--pink-dark); font-size: 2.5rem;">Abhishek & Nikita</h2>
            <input type="password" id="pass-input" placeholder="Password" style="text-align:center;">
            <button onclick="checkPassword()" style="background:var(--pink-dark); color:white; border:none; padding:12px 40px; border-radius:15px; cursor:pointer; font-weight:bold; width:100%; margin-top:10px;">Login</button>
        </div>
    </div>

    <div id="main-content">
        <h1 style="font-family: 'Dancing Script'; color: white; text-shadow: 2px 2px 15px rgba(0,0,0,0.8); font-size: 3.5rem;">Our 2026 Journey</h1>
        <div class="sync-badge" id="sync-status">☁️ Syncing Memories...</div>
        
        <div id="cards-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

        <div style="background: rgba(0,0,0,0.85); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 50px; width: 100%; max-width: 500px; color: white;">
            <p id="progress-text">0 / 26 Dates Completed ❤️</p>
            <button id="pdf-btn" class="pdf-btn" onclick="downloadPDF()" disabled>Locked: Complete A to Z</button>
        </div>
    </div>

    <script>
        // PASTE YOUR FIREBASE CONFIG HERE
		const firebaseConfig = {
		  apiKey: "AIzaSyDts_9i1QJ2GTSm7uRps8cceJ2IrPCIwNU",
		  authDomain: "abhishek-nikita-journal.firebaseapp.com",
		  databaseURL: "https://abhishek-nikita-journal-default-rtdb.firebaseio.com",
		  projectId: "abhishek-nikita-journal",
		  storageBucket: "abhishek-nikita-journal.firebasestorage.app",
		  messagingSenderId: "351891714447",
		  appId: "1:351891714447:web:ac05392a26162005629bfa",
		  measurementId: "G-PD70DXJ1SM"
		};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        async function checkPassword() {
            const HASH = "221e275d97e7827e151e9c661406dde91c89c9f42a0ea53adc6c137438b6ebbe";
            const input = document.getElementById('pass-input').value;
            const msgBuffer = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashedInput = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashedInput === HASH) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                loadData();
            } else { alert("Try again, love!"); }
        }

        function loadData() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const container = document.getElementById('cards-container');
            
            db.ref('/').on('value', (snapshot) => {
                const root = snapshot.val() || {};
                const cloudData = root.dates || {};
                if(root.lastSync) {
                    const time = new Date(root.lastSync).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    document.getElementById('sync-status').innerText = `☁️ Last update: Today at ${time}`;
                }

                container.innerHTML = "";
                let count = 0;

                letters.forEach(l => {
                    const data = cloudData[l] || {};
                    if(data.done) count++;
                    const card = document.createElement('div');
                    card.className = `date-card ${data.done ? 'completed' : ''}`;
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap:15px;">
                            <span style="background:var(--pink-dark); color:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${l}</span>
                            <input type="text" placeholder="Idea..." value="${data.idea || ''}" onchange="updateCloud('${l}', 'idea', this.value)" style="flex:1; border:none; border-bottom:1px solid #ddd; background:transparent; font-weight:bold;">
                            <input type="checkbox" style="width:25px; height:25px;" ${data.done ? 'checked' : ''} onchange="updateCloud('${l}', 'done', this.checked)">
                        </div>
                        <input type="date" value="${data.date || ''}" onchange="updateCloud('${l}', 'date', this.value)">
                        
                        <div style="text-align:center;">
                            <label class="upload-btn" for="file-${l}">📸 Upload Photo</label>
                            <input type="file" id="file-${l}" style="display:none" onchange="uploadToFolder('${l}', this.files[0])">
                            <div id="prog-${l}" class="prog-bar"></div>
                        </div>

                        <div id="media-${l}" class="media-container"></div>
                        <textarea placeholder="Write our story..." onchange="updateCloud('${l}', 'note', this.value)">${data.note || ''}</textarea>
                    `;
                    container.appendChild(card);
                    renderMedia(l, data.links);
                });
                
                document.getElementById('progress-text').innerText = `${count} / 26 Completed ❤️`;
                const btn = document.getElementById('pdf-btn');
                if(count === 26) { btn.classList.add('unlocked'); btn.disabled = false; btn.innerText = "Download Memory PDF"; }
            });
        }

        // UPLOADS DIRECTLY TO "memories/" FOLDER IN CLOUD
        function uploadToFolder(l, file) {
            if (!file) return;
            const progDiv = document.getElementById(`prog-${l}`);
            const storageRef = storage.ref(`memories/${l}/${Date.now()}_${file.name}`);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                (snap) => {
                    const progress = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                    progDiv.innerText = `Sending to Cloud Folder: ${progress}%`;
                }, 
                (err) => { alert("Upload error!"); }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((url) => {
                        progDiv.innerText = "✅ Saved!";
                        db.ref(`dates/${l}/links`).once('value').then(snap => {
                            let current = snap.val() || "";
                            let updated = current ? current + "," + url : url;
                            updateCloud(l, 'links', updated);
                        });
                    });
                }
            );
        }

        function updateCloud(l, key, value) { 
            const updates = {};
            updates[`/dates/${l}/${key}`] = value;
            updates['/lastSync'] = firebase.database.ServerValue.TIMESTAMP;
            db.ref().update(updates);
        }

        function renderMedia(l, links) {
            const div = document.getElementById('media-' + l);
            if(!div || !links) return;
            links.split(',').forEach(url => {
                if(url.includes('.mp4') || url.includes('.webm') || url.includes('.mov')) {
                    div.innerHTML += `<video src="${url}" class="media-item" controls></video>`;
                } else {
                    div.innerHTML += `<img src="${url}" class="media-item">`;
                }
            });
        }

        function downloadPDF() {
            html2pdf().from(document.getElementById('main-content')).save('Abhishek_Nikita_2026.pdf');
        }
    </script>
</body>
</html>
